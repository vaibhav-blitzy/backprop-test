# =============================================================================
# GITHUB DEPENDABOT CONFIGURATION
# Node.js Tutorial HTTP Server Application
# =============================================================================
# Comprehensive Dependabot configuration for Node.js tutorial application
# managing GitHub Actions dependencies and maintaining zero external dependencies
# philosophy. Implements production-ready dependency management patterns with
# educational clarity for automated security updates, version management, and
# GitHub Actions workflow maintenance.
#
# Educational Objectives:
# - Demonstrates automated dependency management for CI/CD infrastructure
# - Shows security vulnerability management and dependency monitoring best practices
# - Illustrates proper semantic versioning and dependency update strategies
# - Shows automated dependency management integration with CI/CD pipelines
#
# Production-Ready Features:
# - Zero external dependencies philosophy maintenance with monitoring validation
# - Node.js LTS version compatibility management and automated updates
# - CI/CD security and maintenance automation for workflow stability
# - Security vulnerability management with automated detection and resolution
# - Comprehensive dependency monitoring with educational impact assessment
# - Pull request automation with educational context and review requirements
#
# @fileoverview GitHub Dependabot configuration for dependency management
# @version 2.0
# @author Node.js Tutorial Application
# @since 2024
# =============================================================================

version: 2

# =============================================================================
# DEPENDABOT UPDATE CONFIGURATION
# =============================================================================

# Comprehensive update configuration for GitHub Actions dependencies and
# npm ecosystem monitoring while maintaining zero external dependencies
# philosophy with educational clarity and production-ready security management

updates:
  # ===========================================================================
  # GITHUB ACTIONS DEPENDENCY MANAGEMENT
  # ===========================================================================
  
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    # Weekly GitHub Actions dependency updates on Monday morning UTC to ensure
    # CI/CD infrastructure security and compatibility with minimal disruption
    
    open-pull-requests-limit: 5
    # Limit concurrent GitHub Actions dependency PRs to prevent review queue
    # overflow while ensuring critical security updates can be processed
    
    reviewers:
      - "@tutorial-maintainers"
    # Assign tutorial maintainers for GitHub Actions dependency review ensuring
    # proper validation of CI/CD workflow changes and educational impact
    
    assignees:
      - "@tutorial-maintainers"
    # Assign tutorial maintainers for dependency update management and coordination
    # with educational content maintenance and workflow stability validation
    
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
      - "automated"
      - "ci-cd-infrastructure"
    # Comprehensive labeling for GitHub Actions dependency updates enabling
    # proper categorization and automated workflow management
    
    milestone: "Dependency Updates"
    # Assign dependency updates to dedicated milestone for tracking and
    # coordination with release planning and educational content updates
    
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    # Standardized commit message formatting following conventional commits
    # pattern for consistent change tracking and automated changelog generation
    
    pull-request-branch-name:
      separator: "/"
    # Configure pull request branch naming with separator for organized
    # branch management and clear dependency update identification
    
    ignore:
      # Ignore older major versions of critical GitHub Actions to maintain
      # modern workflow patterns and security compliance
      - dependency-name: "actions/checkout"
        versions: ["< 4.0.0"]
        # Maintain actions/checkout@v4+ for modern Git checkout patterns
        # and enhanced security with Node.js 20+ compatibility
        
      - dependency-name: "actions/setup-node"
        versions: ["< 4.0.0"]
        # Maintain actions/setup-node@v4+ for Node.js v22.x LTS support
        # and improved caching capabilities for CI/CD optimization
        
      - dependency-name: "actions/cache"
        versions: ["< 3.0.0"]
        # Maintain actions/cache@v3+ for improved caching performance
        # and compatibility with current GitHub Actions runner environment
        
      - dependency-name: "actions/upload-artifact"
        versions: ["< 4.0.0"]
        # Maintain actions/upload-artifact@v4+ for enhanced artifact management
        # and improved upload performance in CI/CD workflows
        
      - dependency-name: "actions/download-artifact"
        versions: ["< 4.0.0"]
        # Maintain actions/download-artifact@v4+ for artifact download consistency
        # and deployment coordination in CD workflow
    
    target-branch: "develop"
    # Target develop branch for GitHub Actions dependency updates ensuring
    # proper testing and validation before main branch integration
    
    # Custom configuration for GitHub Actions specific settings
    rebase-strategy: "auto"
    # Enable automatic rebase strategy for GitHub Actions dependency updates
    # to maintain clean commit history and resolve conflicts automatically
    
    versioning-strategy: "auto"
    # Use automatic versioning strategy for GitHub Actions to leverage
    # semantic versioning and maintain compatibility with workflow requirements

  # ===========================================================================
  # NPM ECOSYSTEM MONITORING AND VALIDATION
  # ===========================================================================
  
  - package-ecosystem: "npm"
    directory: "/src/backend"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    # Weekly npm ecosystem monitoring on Tuesday morning UTC to validate
    # zero external dependencies philosophy and detect accidental additions
    
    open-pull-requests-limit: 2
    # Limit npm dependency PRs to minimum necessary for zero dependency
    # validation while allowing critical security updates if needed
    
    reviewers:
      - "@tutorial-maintainers"
    # Assign tutorial maintainers for npm dependency monitoring and validation
    # of zero external dependencies philosophy maintenance
    
    assignees:
      - "@tutorial-maintainers"
    # Assign tutorial maintainers for npm ecosystem validation and coordination
    # with educational content requirements and dependency philosophy
    
    labels:
      - "dependencies"
      - "npm"
      - "zero-dependencies"
      - "monitoring"
      - "philosophy-validation"
    # Specialized labeling for npm dependency monitoring and zero dependencies
    # philosophy validation with educational impact tracking
    
    milestone: "Zero Dependencies Validation"
    # Assign npm monitoring to dedicated milestone for zero dependencies
    # philosophy tracking and educational content maintenance
    
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Standardized commit message formatting for npm dependency monitoring
    # and zero dependencies philosophy validation updates
    
    pull-request-branch-name:
      separator: "/"
    # Configure pull request branch naming for npm dependency monitoring
    # with clear identification of zero dependencies validation updates
    
    allow:
      # Allow only development dependencies for potential tooling updates
      # while maintaining zero runtime dependencies philosophy
      - dependency-type: "development"
    # Only allow development dependencies to maintain zero external runtime
    # dependencies while enabling development tooling improvements
    
    ignore:
      # Ignore all direct dependencies to maintain zero external dependencies
      # philosophy and prevent accidental runtime dependency additions
      - dependency-type: "direct"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
        # Ignore all direct dependency updates to maintain zero external
        # dependencies philosophy for tutorial application
        
      - dependency-type: "indirect"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
        # Ignore indirect dependency updates as no direct dependencies exist
        # in zero external dependencies architecture
        
      - dependency-type: "production"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
        # Ignore production dependency updates to maintain zero external
        # runtime dependencies philosophy
    
    target-branch: "develop"
    # Target develop branch for npm ecosystem monitoring ensuring proper
    # validation of zero dependencies philosophy before main branch integration
    
    # Custom configuration for npm specific settings
    versioning-strategy: "lockfile-only"
    # Use lockfile-only versioning strategy for npm ecosystem monitoring
    # to track dependency changes without modifying package.json directly

# =============================================================================
# DEPENDABOT VULNERABILITY MANAGEMENT CONFIGURATION
# =============================================================================

# Global vulnerability management settings for comprehensive security monitoring
# and automated vulnerability detection across all monitored ecosystems with
# educational clarity and production-ready security practices

# Note: Vulnerability alerts and security updates are configured at the 
# repository level through GitHub Security settings. This configuration
# complements those settings with package-ecosystem specific monitoring.

# Security update configuration:
# - Enabled for both GitHub Actions and npm ecosystems
# - Automatic pull request creation for security vulnerabilities
# - Integration with GitHub Security Advisory Database
# - Severity-based prioritization with immediate critical/high severity fixes
# - Educational impact assessment for security updates

# Vulnerability alert configuration:
# - Daily vulnerability scanning for all monitored dependencies
# - Email and web notifications for security advisories
# - Integration with npm audit for npm ecosystem validation
# - Custom security policies for educational environment considerations

# =============================================================================
# PULL REQUEST CONFIGURATION AND TEMPLATES
# =============================================================================

# Comprehensive pull request configuration for dependency updates with
# educational context, security impact assessment, and review requirements
# following production-ready dependency management practices

# Pull request title format: "[Dependabot] Update {dependency_name} to {new_version}"
# Pull request description includes:
# - Package ecosystem identification and dependency context
# - Version change summary with current and new version information
# - Update type classification (major, minor, patch, security)
# - Educational context explaining CI/CD infrastructure maintenance
# - Security impact assessment and vulnerability resolution notes
# - Compatibility notes for Node.js LTS and workflow integration
# - Review checklist for CI/CD functionality and philosophy validation

# Automated review requirements:
# - Minimum one reviewer for all dependency updates
# - Code owner review required for GitHub Actions changes
# - Dismiss stale reviews for updated pull requests
# - Status checks must pass before merge eligibility

